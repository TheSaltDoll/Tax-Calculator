<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tax Calc">
<title>Tax Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0e14;
    --surface: #141720;
    --surface2: #1a1e2a;
    --border: #252a3a;
    --text: #e2e4ea;
    --text-dim: #7a7f94;
    --accent-wc: #f05050;
    --accent-mc: #f0c040;
    --accent-cap: #4a9df0;
    --accent-wc-dim: rgba(240,80,80,0.12);
    --accent-mc-dim: rgba(240,192,64,0.12);
    --accent-cap-dim: rgba(74,157,240,0.12);
    --green: #4af07a;
    --radius: 14px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  body {
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
    padding-top: max(env(safe-area-inset-top), 12px);
    padding-bottom: max(env(safe-area-inset-bottom), 24px);
  }

  .app {
    max-width: 420px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    padding: 12px 0 16px;
  }
  header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--accent-wc), var(--accent-mc), var(--accent-cap));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  header p {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }

  /* === SECTIONS === */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  /* === PARAM ROW === */
  .param-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .param-row:last-child { margin-bottom: 0; }

  .param-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    flex-shrink: 1;
    padding-right: 10px;
    line-height: 1.3;
  }

  /* === SEGMENTED CONTROL (A/B/C) === */
  .seg-control {
    display: flex;
    background: var(--bg);
    border-radius: 9px;
    padding: 3px;
    flex-shrink: 0;
  }
  .seg-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .seg-btn.active {
    background: var(--surface2);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  /* === STEPPER === */
  .stepper {
    display: flex;
    align-items: center;
    background: var(--bg);
    border-radius: 9px;
    padding: 3px;
    flex-shrink: 0;
  }
  .stepper button {
    width: 34px;
    height: 34px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 18px;
    font-weight: 600;
    border-radius: 7px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .stepper button:active { background: var(--surface2); }
  .stepper button:disabled { opacity: 0.25; }
  .stepper .stepper-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    min-width: 36px;
    text-align: center;
    color: var(--text);
  }

  /* === DROPDOWN === */
  .dropdown-wrap {
    position: relative;
    flex-shrink: 0;
  }
  .dropdown-wrap select {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    background: var(--bg);
    border: none;
    border-radius: 9px;
    padding: 8px 30px 8px 12px;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
  }
  .dropdown-wrap::after {
    content: '▾';
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 12px;
    pointer-events: none;
  }

  /* === NUMBER INPUT (for Revenue) === */
  .num-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    background: var(--bg);
    border: none;
    border-radius: 9px;
    padding: 8px 12px;
    width: 80px;
    text-align: center;
    outline: none;
  }
  .num-input:focus {
    box-shadow: 0 0 0 2px var(--accent-cap);
  }

  /* === CALCULATE BUTTON === */
  .calc-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: var(--radius);
    background: linear-gradient(135deg, var(--accent-wc), var(--accent-mc), var(--accent-cap));
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .calc-btn:active {
    transform: scale(0.97);
  }
  .calc-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.15s;
  }
  .calc-btn:active::after {
    background: rgba(255,255,255,0.1);
  }

  /* === RESULTS === */
  .results {
    display: none;
  }
  .results.visible { display: block; }

  .result-card {
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    opacity: 0;
    transform: translateY(12px);
  }
  .result-card.animate {
    animation: slideUp 0.4s ease forwards;
  }
  .result-card:nth-child(1) { animation-delay: 0.15s; }
  .result-card:nth-child(2) { animation-delay: 0.35s; }
  .result-card:nth-child(3) { animation-delay: 0.55s; }

  @keyframes slideUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card.wc {
    background: var(--accent-wc-dim);
    border-color: rgba(240,136,74,0.25);
  }
  .result-card.mc {
    background: var(--accent-mc-dim);
    border-color: rgba(240,192,64,0.25);
  }
  .result-card.cap {
    background: var(--accent-cap-dim);
    border-color: rgba(74,157,240,0.25);
  }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .result-name {
    font-size: 14px;
    font-weight: 700;
  }
  .wc .result-name { color: var(--accent-wc); }
  .mc .result-name { color: var(--accent-mc); }
  .cap .result-name { color: var(--accent-cap); }

  .result-total {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
  }
  .wc .result-total { color: var(--accent-wc); }
  .mc .result-total { color: var(--accent-mc); }
  .cap .result-total { color: var(--accent-cap); }

  .result-breakdown {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    font-family: 'JetBrains Mono', monospace;
  }
  .result-breakdown span {
    color: var(--text);
    font-weight: 600;
  }

  /* Pulse animation on button */
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(74,157,240,0.4); }
    70% { box-shadow: 0 0 0 10px rgba(74,157,240,0); }
    100% { box-shadow: 0 0 0 0 rgba(74,157,240,0); }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Tax Calculator</h1>
    <p>Board Game Tax Helper</p>
  </header>

  <!-- Policies -->
  <div class="section">
    <div class="section-title">Policies</div>
    <div class="param-row">
      <div class="param-label">Policy 3 (Taxation)</div>
      <div class="seg-control" data-param="policy3">
        <button class="seg-btn active" data-val="A">A</button>
        <button class="seg-btn" data-val="B">B</button>
        <button class="seg-btn" data-val="C">C</button>
      </div>
    </div>
    <div class="param-row">
      <div class="param-label">Policy 2 (Labor)</div>
      <div class="seg-control" data-param="policy2">
        <button class="seg-btn active" data-val="A">A</button>
        <button class="seg-btn" data-val="B">B</button>
        <button class="seg-btn" data-val="C">C</button>
      </div>
    </div>
  </div>

  <!-- Working Class -->
  <div class="section">
    <div class="section-title" style="color:var(--accent-wc)">Working Class</div>
    <div class="param-row">
      <div class="param-label">Population</div>
      <div class="stepper" data-param="wcPop" data-min="3" data-max="10" data-val="5">
        <button class="dec">−</button>
        <div class="stepper-val">5</div>
        <button class="inc">+</button>
      </div>
    </div>
  </div>

  <!-- Middle Class -->
  <div class="section">
    <div class="section-title" style="color:var(--accent-mc)">Middle Class</div>
    <div class="param-row">
      <div class="param-label">Capitalist/Public Co. w/ MC Workers</div>
      <div class="stepper" data-param="mcCompanies" data-min="0" data-max="21" data-val="0">
        <button class="dec">−</button>
        <div class="stepper-val">0</div>
        <button class="inc">+</button>
      </div>
    </div>
    <div class="param-row">
      <div class="param-label">Operational MC Companies</div>
      <div class="stepper" data-param="mcOps" data-min="0" data-max="8" data-val="0">
        <button class="dec">−</button>
        <div class="stepper-val">0</div>
        <button class="inc">+</button>
      </div>
    </div>
  </div>

  <!-- Capitalist -->
  <div class="section">
    <div class="section-title" style="color:var(--accent-cap)">Capitalist</div>
    <div class="param-row">
      <div class="param-label">Operational Cap. Companies</div>
      <div class="stepper" data-param="capOps" data-min="0" data-max="12" data-val="0">
        <button class="dec">−</button>
        <div class="stepper-val">0</div>
        <button class="inc">+</button>
      </div>
    </div>
    <div class="param-row">
      <div class="param-label">Revenue</div>
      <input type="number" class="num-input" id="capRevenue" value="0" min="0" inputmode="numeric">
    </div>
  </div>

  <!-- Shared -->
  <div class="section">
    <div class="section-title">Shared</div>
    <div class="param-row">
      <div class="param-label">Tax Multiplier</div>
      <div class="dropdown-wrap">
        <select id="taxMultiplier">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="9">9</option>
          <option value="11">11</option>
        </select>
      </div>
    </div>
  </div>

  <button class="calc-btn" id="calcBtn">Calculate Taxes</button>

  <div class="results" id="results">
    <div class="result-card wc" id="resWC"></div>
    <div class="result-card mc" id="resMC"></div>
    <div class="result-card cap" id="resCap"></div>
  </div>
</div>

<script>
  // === STATE ===
  const state = {
    policy3: 'A',
    policy2: 'A',
    wcPop: 5,
    mcCompanies: 0,
    mcOps: 0,
    capOps: 0,
    capRevenue: 0,
    taxMultiplier: 1
  };

  // === TABLES ===
  // Working Class & Middle Class Income Tax table [policy2][policy3]
  const incomeTaxTable = {
    A: { A: 7, B: 6, C: 5 },
    B: { A: 4, B: 4, C: 4 },
    C: { A: 1, B: 2, C: 3 }
  };

  // Corporate Tax table: returns tax based on revenue range and policy3
  function getCorporateTax(revenue, policy3) {
    if (revenue < 5) return 0;
    const brackets = [
      { min: 5,   max: 9,   A: 1,   B: 2,   C: 2 },
      { min: 10,  max: 24,  A: 5,   B: 5,   C: 4 },
      { min: 25,  max: 49,  A: 12,  B: 10,  C: 7 },
      { min: 50,  max: 99,  A: 24,  B: 15,  C: 10 },
      { min: 100, max: 199, A: 40,  B: 30,  C: 20 },
      { min: 200, max: 299, A: 100, B: 70,  C: 40 },
      { min: 300, max: Infinity, A: 160, B: 120, C: 60 }
    ];
    const bracket = brackets.find(b => revenue >= b.min && revenue <= b.max);
    return bracket ? bracket[policy3] : 0;
  }

  // === SEGMENTED CONTROLS ===
  document.querySelectorAll('.seg-control').forEach(ctrl => {
    const param = ctrl.dataset.param;
    ctrl.querySelectorAll('.seg-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        ctrl.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state[param] = btn.dataset.val;
      });
    });
  });

  // === STEPPERS ===
  document.querySelectorAll('.stepper').forEach(stepper => {
    const param = stepper.dataset.param;
    const min = parseInt(stepper.dataset.min);
    const max = parseInt(stepper.dataset.max);
    const valEl = stepper.querySelector('.stepper-val');
    const decBtn = stepper.querySelector('.dec');
    const incBtn = stepper.querySelector('.inc');

    function update() {
      valEl.textContent = state[param];
      decBtn.disabled = state[param] <= min;
      incBtn.disabled = state[param] >= max;
    }

    decBtn.addEventListener('click', () => {
      if (state[param] > min) { state[param]--; update(); }
    });
    incBtn.addEventListener('click', () => {
      if (state[param] < max) { state[param]++; update(); }
    });

    // Long-press repeat
    let interval;
    [decBtn, incBtn].forEach(btn => {
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        btn.click();
        interval = setInterval(() => btn.click(), 120);
      });
      btn.addEventListener('touchend', () => clearInterval(interval));
      btn.addEventListener('touchcancel', () => clearInterval(interval));
    });

    update();
  });

  // === INPUTS ===
  document.getElementById('capRevenue').addEventListener('input', e => {
    let v = parseInt(e.target.value) || 0;
    if (v < 0) v = 0;
    state.capRevenue = v;
  });

  document.getElementById('taxMultiplier').addEventListener('change', e => {
    state.taxMultiplier = parseInt(e.target.value);
  });

  // === CALCULATE ===
  document.getElementById('calcBtn').addEventListener('click', () => {
    const { policy2, policy3, wcPop, mcCompanies, mcOps, capOps, capRevenue, taxMultiplier } = state;

    // Working Class
    const wcRate = incomeTaxTable[policy2][policy3];
    const wcTax = wcRate * wcPop;

    // Middle Class
    const mcEmploymentTax = mcOps * taxMultiplier;
    const mcIncomeRate = incomeTaxTable[policy2][policy3];
    const mcIncomeTax = mcIncomeRate * mcCompanies;
    const mcTotalTax = mcEmploymentTax + mcIncomeTax;

    // Capitalist
    const capEmploymentTax = capOps * taxMultiplier;
    const revenueAfterEmployment = capRevenue - capEmploymentTax;
    const corpTax = getCorporateTax(Math.max(0, revenueAfterEmployment), policy3);
    const capTotalTax = capEmploymentTax + corpTax;

    // Render
    const results = document.getElementById('results');
    results.classList.add('visible');

    // Reset animations
    document.querySelectorAll('.result-card').forEach(c => {
      c.classList.remove('animate');
      c.offsetHeight; // reflow
      c.style.opacity = '0';
      c.style.transform = 'translateY(12px)';
    });

    requestAnimationFrame(() => {
      document.querySelectorAll('.result-card').forEach(c => {
        c.classList.add('animate');
      });
    });

    // Working Class
    document.getElementById('resWC').innerHTML = `
      <div class="result-header">
        <div class="result-name">Working Class</div>
        <div class="result-total">§${wcTax}</div>
      </div>
      <div class="result-breakdown">
        Tax per population: <span>${wcRate}</span> (2${policy2}+3${policy3})<br>
        × Population: <span>${wcPop}</span><br>
        = Total: <span>${wcRate} × ${wcPop} = ${wcTax}</span>
      </div>
    `;

    // Middle Class
    document.getElementById('resMC').innerHTML = `
      <div class="result-header">
        <div class="result-name">Middle Class</div>
        <div class="result-total">§${mcTotalTax}</div>
      </div>
      <div class="result-breakdown">
        Employment Tax: <span>${mcOps}</span> co. × <span>${taxMultiplier}</span> = <span>${mcEmploymentTax}</span><br>
        Income Tax per co.: <span>${mcIncomeRate}</span> (2${policy2}+3${policy3})<br>
        × MC Worker co.: <span>${mcCompanies}</span> = <span>${mcIncomeTax}</span><br>
        = Total: <span>${mcEmploymentTax} + ${mcIncomeTax} = ${mcTotalTax}</span>
      </div>
    `;

    // Capitalist
    const revNote = revenueAfterEmployment < 0
      ? `Revenue after Emp. Tax: <span>${capRevenue} − ${capEmploymentTax} = ${revenueAfterEmployment}</span> (treated as 0)`
      : `Revenue after Emp. Tax: <span>${capRevenue} − ${capEmploymentTax} = ${revenueAfterEmployment}</span>`;

    document.getElementById('resCap').innerHTML = `
      <div class="result-header">
        <div class="result-name">Capitalist</div>
        <div class="result-total">§${capTotalTax}</div>
      </div>
      <div class="result-breakdown">
        Employment Tax: <span>${capOps}</span> co. × <span>${taxMultiplier}</span> = <span>${capEmploymentTax}</span><br>
        ${revNote}<br>
        Corporate Tax (3${policy3}): <span>${corpTax}</span><br>
        = Total: <span>${capEmploymentTax} + ${corpTax} = ${capTotalTax}</span>
      </div>
    `;
  });
</script>
</body>
</html>
